<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berjaya Gas</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:Poppins,sans-serif;
  margin:0;
  overflow-x:hidden;
  background:linear-gradient(270deg,#ff6ec7,#8b5cf6,#22d3ee,#ec4899);
  background-size:800% 800%;
  animation:move 18s ease infinite;
}

@keyframes move{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.blob{
  position:absolute;
  width:350px;
  height:350px;
  border-radius:50%;
  filter:blur(90px);
  opacity:.6;
  animation:float 14s infinite ease-in-out;
  z-index:0;
}

.blob1{background:#ff6ec7;top:10%;left:15%}
.blob2{background:#8b5cf6;top:60%;left:70%;animation-delay:4s}
.blob3{background:#22d3ee;top:80%;left:25%;animation-delay:7s}

@keyframes float{
  0%{transform:translate(0,0) scale(1)}
  50%{transform:translate(-50px,-70px) scale(1.3)}
  100%{transform:translate(0,0) scale(1)}
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen text-black p-4">

<!-- BACKGROUND -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<!-- CARD -->
<div class="bg-white/90 backdrop-blur-lg w-full max-w-sm p-6 rounded-2xl shadow-2xl z-10">

<h1 class="text-xl font-semibold text-center mb-5">Berjaya Gas</h1>

<!-- NIK -->
<input id="nik" type="number" placeholder="NIK (16 digit)"
class="w-full p-3 rounded-lg mb-3 border">

<!-- PRODUK -->
<select id="produk" class="w-full p-3 rounded-lg mb-3 border">
<option value="20000">LPG 3 Kg - Rp20.000</option>
<option value="90000">LPG 5.5 Kg - Rp90.000</option>
<option value="180000">LPG 12 Kg - Rp180.000</option>
</select>

<!-- JUMLAH -->
<input id="jumlah" type="number" value="1"
class="w-full p-3 rounded-lg mb-3 border text-center">

<!-- METODE -->
<select id="metode" class="w-full p-3 rounded-lg mb-3 border">
<option value="Ambil">Ambil di Tempat</option>
<option value="Antar">Diantar (+Rp5.000)</option>
</select>

<!-- NAMA -->
<input id="nama" type="text" placeholder="Nama"
class="w-full p-3 rounded-lg mb-4 border">

<!-- TOTAL -->
<div class="text-center mb-4">
<p class="text-sm text-gray-500">Total</p>
<h2 id="total" class="text-2xl font-bold text-pink-600">Rp0</h2>
</div>

<!-- BUTTON -->
<button onclick="pesanWA()"
class="w-full bg-gradient-to-r from-pink-500 to-purple-500 text-white py-3 rounded-lg font-semibold">
Pesan via WhatsApp
</button>

</div>

<script>

function formatRupiah(a){
return "Rp"+a.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".");
}

function hitung(){
let harga=parseInt(document.getElementById("produk").value);
let jumlah=parseInt(document.getElementById("jumlah").value)||0;
let metode=document.getElementById("metode").value;

let ongkir=metode==="Antar"?5000:0;
let total=(harga*jumlah)+ongkir;

document.getElementById("total").innerText=formatRupiah(total);
}

function pesanWA(){

let nik=document.getElementById("nik").value;
let nama=document.getElementById("nama").value;
let metode=document.getElementById("metode").value;
let produk=document.getElementById("produk").options[document.getElementById("produk").selectedIndex].text;
let jumlah=document.getElementById("jumlah").value;
let total=document.getElementById("total").innerText;

if(nik.length!==16){
alert("NIK harus 16 digit!");
return;
}

if(nama===""){
alert("Isi nama!");
return;
}

let pesan=`*PESANAN GAS MEUNASAH COT*%0A%0A
NIK: ${nik}%0A
Nama: ${nama}%0A
Produk: ${produk}%0A
Jumlah: ${jumlah}%0A
Metode: ${metode}%0A
%0ATotal: ${total}`;

let wa="https://wa.me/6281234567890?text="+pesan;

window.open(wa,"_blank");
}

document.getElementById("produk").addEventListener("change",hitung);
document.getElementById("jumlah").addEventListener("input",hitung);
document.getElementById("metode").addEventListener("change",hitung);

hitung();

</script>

</body>
</html>
