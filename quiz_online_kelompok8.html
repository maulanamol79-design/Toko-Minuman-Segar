<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Online Faisal</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a12;
        --surface: #12121e;
        --surface2: #1c1c2e;
        --accent: #7c5cfc;
        --accent2: #c084fc;
        --gold: #f9c74f;
        --text: #f0f0ff;
        --muted: #8888aa;
        --border: rgba(124, 92, 252, 0.2);
        --glow: rgba(124, 92, 252, 0.35);
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow-x: hidden;
      }

      /* Animated background */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse 60% 50% at 20% 20%,
            rgba(124, 92, 252, 0.12) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 50% 60% at 80% 80%,
            rgba(192, 132, 252, 0.08) 0%,
            transparent 70%
          );
        pointer-events: none;
        z-index: 0;
      }

      /* Floating orbs */
      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(60px);
        pointer-events: none;
        z-index: 0;
        animation: drift 8s ease-in-out infinite alternate;
      }
      .orb-1 {
        width: 300px;
        height: 300px;
        background: rgba(124, 92, 252, 0.15);
        top: -80px;
        left: -80px;
        animation-delay: 0s;
      }
      .orb-2 {
        width: 200px;
        height: 200px;
        background: rgba(192, 132, 252, 0.12);
        bottom: -60px;
        right: -60px;
        animation-delay: 3s;
      }

      @keyframes drift {
        from {
          transform: translate(0, 0) scale(1);
        }
        to {
          transform: translate(30px, 20px) scale(1.1);
        }
      }

      /* Card */
      #app {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 480px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 36px 32px;
        box-shadow:
          0 0 60px rgba(51, 0, 255, 0.1),
          0 20px 60px rgba(255, 0, 0, 0.4);
        animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* Logo / Title */
      .logo {
        text-align: center;
        margin-bottom: 28px;
      }
      .logo-icon {
        font-size: 40px;
        display: inline-block;
        animation: pulse 2.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1) rotate(-3deg);
        }
        50% {
          transform: scale(1.1) rotate(3deg);
        }
      }
      .logo h1 {
        font-family: "Syne", sans-serif;
        font-size: 26px;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.5px;
        margin-top: 6px;
      }
      .logo p {
        color: var(--muted);
        font-size: 13px;
        margin-top: 4px;
      }

      /* Leaderboard */
      .section-label {
        font-family: "Syne", sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--accent2);
        margin-bottom: 12px;
      }

      #leaderboard-list {
        margin-bottom: 24px;
      }

      .lb-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        border-radius: 12px;
        background: var(--surface2);
        border: 1px solid var(--border);
        margin-bottom: 8px;
        animation: slideIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .lb-item:nth-child(1) {
        animation-delay: 0.05s;
      }
      .lb-item:nth-child(2) {
        animation-delay: 0.1s;
      }
      .lb-item:nth-child(3) {
        animation-delay: 0.15s;
      }
      .lb-item:nth-child(4) {
        animation-delay: 0.2s;
      }
      .lb-item:nth-child(5) {
        animation-delay: 0.25s;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-16px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .lb-rank {
        font-family: "Syne", sans-serif;
        font-size: 13px;
        font-weight: 800;
        width: 28px;
        text-align: center;
        flex-shrink: 0;
      }
      .lb-rank.gold {
        color: #f9c74f;
      }
      .lb-rank.silver {
        color: #b0b8c9;
      }
      .lb-rank.bronze {
        color: #cd7f32;
      }
      .lb-rank.other {
        color: var(--muted);
      }

      .lb-name {
        flex: 1;
        font-size: 14px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .lb-score {
        font-family: "Syne", sans-serif;
        font-size: 14px;
        font-weight: 700;
        color: var(--accent2);
        background: rgba(124, 92, 252, 0.12);
        padding: 3px 10px;
        border-radius: 20px;
      }

      .lb-empty {
        text-align: center;
        color: var(--muted);
        font-size: 13px;
        padding: 16px 0;
      }

      /* Divider */
      .divider {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--border),
          transparent
        );
        margin: 20px 0;
      }

      /* Input */
      .input-wrap {
        position: relative;
        margin-bottom: 14px;
      }
      .input-wrap input {
        width: 100%;
        padding: 13px 16px 13px 44px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        outline: none;
        transition:
          border-color 0.25s,
          box-shadow 0.25s;
      }
      .input-wrap input::placeholder {
        color: var(--muted);
      }
      .input-wrap input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.15);
      }
      .input-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
        pointer-events: none;
      }

      /* Button */
      .btn-primary {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-family: "Syne", sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.5px;
        position: relative;
        overflow: hidden;
        transition:
          transform 0.18s,
          box-shadow 0.18s,
          opacity 0.18s;
        box-shadow: 0 4px 20px rgba(124, 92, 252, 0.35);
      }
      .btn-primary::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0);
        transition: background 0.18s;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(124, 92, 252, 0.45);
      }
      .btn-primary:active {
        transform: translateY(0);
        opacity: 0.85;
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      /* Loader */
      #loader {
        display: none;
        justify-content: center;
        align-items: center;
        gap: 8px;
        padding: 14px 0 4px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        animation: bounce 0.9s ease-in-out infinite;
      }
      .dot:nth-child(2) {
        animation-delay: 0.15s;
        background: var(--accent2);
      }
      .dot:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0.6);
          opacity: 0.5;
        }
        40% {
          transform: scale(1.2);
          opacity: 1;
        }
      }

      /* ── Quiz View ── */
      #view-quiz {
        display: none;
      }

      .q-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .q-counter {
        font-size: 13px;
        color: var(--muted);
        font-weight: 500;
      }
      .q-score-badge {
        font-family: "Syne", sans-serif;
        font-size: 13px;
        font-weight: 700;
        color: var(--gold);
        background: rgba(249, 199, 79, 0.1);
        border: 1px solid rgba(249, 199, 79, 0.2);
        padding: 4px 12px;
        border-radius: 20px;
      }

      /* Progress bar */
      .progress-track {
        height: 4px;
        background: var(--surface2);
        border-radius: 2px;
        margin-bottom: 24px;
        overflow: hidden;
      }
      #progress-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        border-radius: 2px;
        transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        box-shadow: 0 0 8px var(--glow);
      }

      #q-text {
        font-family: "Syne", sans-serif;
        font-size: 18px;
        font-weight: 700;
        line-height: 1.4;
        margin-bottom: 22px;
        animation: fadeUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      #options {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .opt-btn {
        width: 100%;
        padding: 14px 18px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 500;
        text-align: left;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        transition:
          border-color 0.2s,
          background 0.2s,
          transform 0.18s;
        animation: fadeUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .opt-btn:nth-child(1) {
        animation-delay: 0.05s;
      }
      .opt-btn:nth-child(2) {
        animation-delay: 0.1s;
      }
      .opt-btn:nth-child(3) {
        animation-delay: 0.15s;
      }
      .opt-btn:nth-child(4) {
        animation-delay: 0.2s;
      }

      .opt-btn:hover:not(:disabled) {
        border-color: var(--accent);
        background: rgba(124, 92, 252, 0.08);
        transform: translateX(4px);
      }
      .opt-btn .opt-label {
        width: 26px;
        height: 26px;
        border-radius: 8px;
        background: rgba(124, 92, 252, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Syne", sans-serif;
        font-size: 12px;
        font-weight: 800;
        flex-shrink: 0;
        color: var(--accent2);
        transition: background 0.2s;
      }
      .opt-btn:hover:not(:disabled) .opt-label {
        background: var(--accent);
        color: #fff;
      }
      .opt-btn.correct {
        border-color: #4ade80 !important;
        background: rgba(74, 222, 128, 0.08) !important;
        animation: correctPop 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .opt-btn.correct .opt-label {
        background: #4ade80 !important;
        color: #0a0a12 !important;
      }
      .opt-btn.wrong {
        border-color: #f87171 !important;
        background: rgba(248, 113, 113, 0.08) !important;
        animation: shake 0.4s ease;
      }
      .opt-btn.wrong .opt-label {
        background: #f87171 !important;
        color: #fff !important;
      }
      .opt-btn:disabled {
        cursor: not-allowed;
      }

      @keyframes correctPop {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.03);
        }
        100% {
          transform: scale(1);
        }
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-6px);
        }
        60% {
          transform: translateX(6px);
        }
      }

      /* ── Finish View ── */
      #view-finish {
        display: none;
        text-align: center;
        animation: cardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .finish-emoji {
        font-size: 56px;
        display: block;
        margin-bottom: 12px;
        animation: popIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes popIn {
        from {
          transform: scale(0) rotate(-20deg);
          opacity: 0;
        }
        to {
          transform: scale(1) rotate(0deg);
          opacity: 1;
        }
      }
      .finish-title {
        font-family: "Syne", sans-serif;
        font-size: 22px;
        font-weight: 800;
        margin-bottom: 8px;
      }
      .finish-sub {
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 28px;
      }

      .score-ring {
        position: relative;
        width: 140px;
        height: 140px;
        margin: 0 auto 28px;
      }
      .score-ring svg {
        transform: rotate(-90deg);
      }
      .score-ring circle.track {
        fill: none;
        stroke: var(--surface2);
        stroke-width: 10;
      }
      .score-ring circle.fill {
        fill: none;
        stroke: url(#grad);
        stroke-width: 10;
        stroke-linecap: round;
        stroke-dasharray: 339.29;
        stroke-dashoffset: 339.29;
        transition: stroke-dashoffset 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s;
      }
      .score-center {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .score-num {
        font-family: "Syne", sans-serif;
        font-size: 32px;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .score-lbl {
        font-size: 11px;
        color: var(--muted);
      }

      .saving-msg {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .saving-spinner {
        width: 14px;
        height: 14px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        flex-shrink: 0;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* init skeleton */
      .skeleton {
        height: 44px;
        border-radius: 12px;
        background: linear-gradient(
          90deg,
          var(--surface2) 25%,
          #1f1f35 50%,
          var(--surface2) 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
        margin-bottom: 8px;
      }
      @keyframes shimmer {
        from {
          background-position: 200% 0;
        }
        to {
          background-position: -200% 0;
        }
      }

      /* confetti canvas */
      #confetti-canvas {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 999;
      }
    </style>
  </head>
  <body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <canvas id="confetti-canvas"></canvas>

    <div id="app">
      <!-- HOME -->
      <div id="view-home">
        <div class="logo">
          <span class="logo-icon">🧠</span>
          <h1>Quiz Online</h1>
          <p>Uji pengetahuanmu & raih skor tertinggi!</p>
        </div>

        <div class="section-label">🏆 Top 5 Leaderboard</div>
        <div id="leaderboard-list">
          <div class="skeleton"></div>
          <div class="skeleton" style="opacity: 0.7"></div>
          <div class="skeleton" style="opacity: 0.5"></div>
        </div>

        <div class="divider"></div>

        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input
            type="text"
            id="nama"
            placeholder="Masukkan nama kamu..."
            maxlength="30"
          />
        </div>

        <button class="btn-primary" id="btn-start" onclick="startQuiz()">
          Mulai Kuis ✦
        </button>

        <div id="loader">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>

      <!-- QUIZ -->
      <div id="view-quiz">
        <div class="q-header">
          <span class="q-counter" id="q-counter">Soal 1 / 10</span>
          <span class="q-score-badge" id="q-score-live">⭐ 0</span>
        </div>
        <div class="progress-track">
          <div id="progress-bar" style="width: 0%"></div>
        </div>
        <div id="q-text">Memuat soal...</div>
        <div id="options"></div>
      </div>

      <!-- FINISH -->
      <div id="view-finish">
        <span class="finish-emoji" id="finish-emoji">🎉</span>
        <div class="finish-title" id="finish-title">Kuis Selesai!</div>
        <div class="finish-sub" id="finish-sub">Hasil akhirmu:</div>

        <div class="score-ring">
          <svg width="140" height="140" viewBox="0 0 140 140">
            <defs>
              <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#7c5cfc" />
                <stop offset="100%" stop-color="#c084fc" />
              </linearGradient>
            </defs>
            <circle class="track" cx="70" cy="70" r="54" />
            <circle class="fill" id="ring-fill" cx="70" cy="70" r="54" />
          </svg>
          <div class="score-center">
            <div class="score-num" id="score-display">0</div>
            <div class="score-lbl">poin</div>
          </div>
        </div>

        <div class="saving-msg" id="saving-msg">
          <div class="saving-spinner"></div>
          Menyimpan skor...
        </div>

        <button class="btn-primary" onclick="location.reload()">
          Main Lagi 🔄
        </button>
      </div>
    </div>

    <script>
      const API =
        "https://script.google.com/macros/s/AKfycbxmxU4X5fdQRFmNz9unNQHFnJPcx6Fyxl_-ulz1xGAB4EUR-H_tCSj50EKrZXRocE4mpQ/exec";
      let quizData = [],
        idx = 0,
        score = 0,
        nama = "",
        answered = false;

      /* ── Init ── */
      window.onload = async () => {
        try {
          const res = await fetch(API);
          const data = await res.json();
          quizData = data.quiz || [];
          renderLeaderboard(data.board || []);
        } catch (e) {
          document.getElementById("leaderboard-list").innerHTML =
            '<div class="lb-empty">Gagal memuat data 😢</div>';
        }
      };

      function renderLeaderboard(board) {
        const list = document.getElementById("leaderboard-list");
        const medals = ["gold", "silver", "bronze", "other", "other"];
        const icons = ["🥇", "🥈", "🥉", "4", "5"];
        if (board.length === 0) {
          list.innerHTML =
            '<div class="lb-empty">Belum ada pemain. Jadilah yang pertama!</div>';
          return;
        }
        list.innerHTML = board
          .map(
            (r, i) => `
          <div class="lb-item">
            <span class="lb-rank ${medals[i]}">${icons[i]}</span>
            <span class="lb-name">${escHtml(r[0])}</span>
            <span class="lb-score">${r[1]} poin</span>
          </div>`,
          )
          .join("");
      }

      function escHtml(s) {
        return String(s).replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );
      }

      /* ── Start ── */
      function startQuiz() {
        nama = document.getElementById("nama").value.trim();
        if (!nama) {
          shakeInput();
          return;
        }
        document.getElementById("btn-start").disabled = true;
        document.getElementById("loader").style.display = "flex";
        setTimeout(() => {
          show("view-quiz");
          runQuiz();
        }, 700);
      }

      function shakeInput() {
        const inp = document.getElementById("nama");
        inp.style.animation = "none";
        inp.offsetHeight; // reflow
        inp.style.animation = "shake 0.4s ease";
        inp.style.borderColor = "#f87171";
        inp.focus();
        setTimeout(() => {
          inp.style.borderColor = "";
          inp.style.animation = "";
        }, 800);
      }

      /* ── Quiz ── */
      function runQuiz() {
        answered = false;
        const q = quizData[idx];
        const total = quizData.length;

        document.getElementById("q-counter").textContent =
          `Soal ${idx + 1} / ${total}`;
        document.getElementById("q-score-live").textContent = `⭐ ${score}`;
        document.getElementById("progress-bar").style.width =
          `${(idx / total) * 100}%`;

        // question text with re-trigger animation
        const qt = document.getElementById("q-text");
        qt.style.animation = "none";
        qt.offsetHeight;
        qt.style.animation = "fadeUp 0.4s cubic-bezier(.22,1,.36,1) both";
        qt.textContent = q.pertanyaan;

        const cont = document.getElementById("options");
        cont.innerHTML = "";
        const labels = ["A", "B", "C", "D"];
        ["a", "b", "c", "d"].forEach((o, i) => {
          if (!q["opsi_" + o]) return;
          const btn = document.createElement("button");
          btn.className = "opt-btn";
          btn.style.animationDelay = `${0.05 + i * 0.06}s`;
          btn.innerHTML = `<span class="opt-label">${labels[i]}</span><span>${escHtml(q["opsi_" + o])}</span>`;
          btn.onclick = () => handleAnswer(o, q.jawaban_benar);
          cont.appendChild(btn);
        });
      }

      function handleAnswer(chosen, correct) {
        if (answered) return;
        answered = true;

        const btns = document.querySelectorAll(".opt-btn");
        const keys = ["a", "b", "c", "d"];

        btns.forEach((btn, i) => {
          btn.disabled = true;
          if (keys[i] === correct) btn.classList.add("correct");
          else if (keys[i] === chosen) btn.classList.add("wrong");
        });

        if (chosen === correct) score += 10;

        setTimeout(() => {
          idx++;
          document.getElementById("q-score-live").textContent = `⭐ ${score}`;
          if (idx < quizData.length) runQuiz();
          else showFinish();
        }, 900);
      }

      /* ── Finish ── */
      function showFinish() {
        const total = quizData.length * 10;
        const pct = total > 0 ? score / total : 0;

        // emoji & message
        const finish = document.getElementById("view-finish");
        document.getElementById("finish-emoji").textContent =
          pct >= 0.8 ? "🏆" : pct >= 0.5 ? "🎉" : "😅";
        document.getElementById("finish-title").textContent = `Hebat, ${nama}!`;
        document.getElementById("finish-sub").textContent =
          pct >= 0.8
            ? "Luar biasa! Kamu sangat pintar!"
            : pct >= 0.5
              ? "Bagus! Terus semangat belajar!"
              : "Jangan menyerah, coba lagi!";
        document.getElementById("score-display").textContent = score;

        show("view-finish");

        // Ring animation
        const circ = 2 * Math.PI * 54;
        const offset = circ - pct * circ;
        setTimeout(() => {
          document.getElementById("ring-fill").style.strokeDashoffset = offset;
        }, 100);

        // confetti if good
        if (pct >= 0.5) launchConfetti();

        // Save score
        const fd = new FormData();
        fd.append("nama", nama);
        fd.append("skor", score);
        fetch(API, { method: "POST", body: fd })
          .then(() => {
            document.getElementById("saving-msg").innerHTML =
              "✅ Skor tersimpan!";
          })
          .catch(() => {
            document.getElementById("saving-msg").innerHTML =
              "⚠️ Gagal menyimpan skor.";
          });
      }

      /* ── Helpers ── */
      function show(id) {
        ["view-home", "view-quiz", "view-finish"].forEach((v) => {
          const el = document.getElementById(v);
          el.style.display = v === id ? "block" : "none";
        });
      }

      /* ── Confetti ── */
      function launchConfetti() {
        const canvas = document.getElementById("confetti-canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const colors = [
          "#7c5cfc",
          "#c084fc",
          "#f9c74f",
          "#4ade80",
          "#f87171",
          "#60a5fa",
        ];
        const particles = Array.from({ length: 120 }, () => ({
          x: Math.random() * canvas.width,
          y: -10 - Math.random() * 100,
          w: 6 + Math.random() * 8,
          h: 10 + Math.random() * 10,
          color: colors[Math.floor(Math.random() * colors.length)],
          rot: Math.random() * 360,
          vx: (Math.random() - 0.5) * 3,
          vy: 2 + Math.random() * 4,
          vr: (Math.random() - 0.5) * 8,
          alpha: 1,
        }));

        let frame;
        function draw() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          let alive = false;
          particles.forEach((p) => {
            p.x += p.vx;
            p.y += p.vy;
            p.rot += p.vr;
            if (p.y > canvas.height * 0.7) p.alpha -= 0.02;
            if (p.alpha > 0) {
              alive = true;
              ctx.save();
              ctx.globalAlpha = Math.max(0, p.alpha);
              ctx.translate(p.x, p.y);
              ctx.rotate((p.rot * Math.PI) / 180);
              ctx.fillStyle = p.color;
              ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
              ctx.restore();
            }
          });
          if (alive) frame = requestAnimationFrame(draw);
          else ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        draw();
        setTimeout(() => {
          cancelAnimationFrame(frame);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }, 4000);
      }
    </script>
  </body>
</html>
